<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DAMN ART</title>
    <link rel="stylesheet" href="https://cdn.datatables.net/1.11.5/css/jquery.dataTables.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="styles.css">
</head>

<body>

    <header>
        <h1>DAMN ART</h1>
        <input type="text" id="searchBar" placeholder="Buscar producto...">
        <button class="checkout-btn" onclick="irAlCarrito()">
            <i class="fas fa-shopping-cart"></i>
        </button>
    </header>

    <div class="tab-toggle" id="tabToggle" onclick="toggleCarrito()">🛍️</div>

    <div class="container">
        <div class="products">
            <div class="product">
                <img src="img/tote_bag.jpg" alt="Producto 1">
                <h2>totebag 1/3</h2>
                <p>Bolsa de compras ecológica 100% algodón</p>
                <p>Precio: $1000</p>
                <button onclick="agregarAlCarrito('totebag 1/3', 1000)">Agregar al carrito</button>
            </div>

            <div class="product">
                <img src="img/diseño1.jpeg" alt="Producto 2">
                <h2>Diseño 1</h2>
                <p>Diseño de motociclista chido</p>
                <p>Precio: $2500</p>
                <button onclick="agregarAlCarrito('Diseño 1', 2500)">Agregar al carrito</button>
            </div>

            <div class="product">
                <img src="img/diseño2.jpeg" alt="Producto 3">
                <h2>Diseño 2</h2>
                <p>Diseño de motociclista chido</p>
                <p>Precio: $2500</p>
                <button onclick="agregarAlCarrito('Diseño 2', 2500)">Agregar al carrito</button>
            </div>
        </div>

        <div class="carrito-container" id="carritoContainer">
            <h2>Lista de productos</h2>
            <table id="carritoTable" class="display">
                <thead>
                    <tr>
                        <th>Producto</th>
                        <th>Precio</th>
                        <th>Acciones</th>
                    </tr>
                </thead>
                <tbody id="tablaProductos">
                    <!-- Productos generados dinámicamente -->
                </tbody>
            </table>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.datatables.net/1.11.5/js/jquery.dataTables.min.js"></script>
    <script src="script2.js"></script>

</body>

</html>
