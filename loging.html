<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login DAMN ART</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        /* Estilo general del cuerpo */
        body {
            font-family: 'Arial', sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f0f0f0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        header {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            padding: 15px;
            background-color: #222;
            color: white;
            text-align: center;
        }

        /* Contenedor principal */
        .main-container {
            display: flex;
            width: 800px;
            background-color: white;
            border-radius: 15px;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.1);
            overflow: hidden;
        }

        /* Galería */
        .gallery-container {
            flex: 1;
            position: relative;
            overflow: hidden;
        }

        .gallery-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: none;
            transition: opacity 1s ease-in-out;
        }

        .gallery-container img.active {
            display: block;
            opacity: 1;
        }

        /* Formulario de login */
        .login-container {
            flex: 1;
            padding: 40px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        h2 {
            text-align: center;
            margin-bottom: 20px;
        }

        input {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border: 1px solid #ddd;
            border-radius: 5px;
        }

        .error {
            color: red;
            font-size: 14px;
            display: none;
            margin-top: -10px;
            margin-bottom: 10px;
        }

        button {
            width: 100%;
            padding: 10px;
            background-color: #333;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: background-color 0.3s;
        }

        button:hover {
            background-color: #555;
        }
    </style>
</head>

<body>

    <header>
        <h1>DAMN ART</h1>
    </header>

    <!-- Contenedor principal que contiene la galería y el formulario -->
    <div class="main-container">
        <!-- Galería de imágenes -->
        <div class="gallery-container" id="gallery">
            <img src="C:\Users\pmarta16\OneDrive - Clarios\Documents\Pagina\img\diseño1.jpeg" class="active"
                alt="Imagen 1">
            <img src="C:\Users\pmarta16\OneDrive - Clarios\Documents\Pagina\img\diseño2.jpeg" alt="Imagen 2">
            <img src="C:\Users\pmarta16\OneDrive - Clarios\Documents\Pagina\img\tote_bag.jpg" alt="Imagen 3">
            <img src="C:\Users\pmarta16\OneDrive - Clarios\Documents\Pagina\img\diseño1.jpeg" alt="Imagen 4">
        </div>

        <!-- Formulario de login -->
        <div class="login-container">
            <h2>Iniciar Sesión</h2>
            <form id="loginForm">
                <input type="email" id="email" placeholder="Correo electrónico" required>
                <div class="error" id="emailError">Por favor, ingresa un correo válido.</div>

                <input type="password" id="password" placeholder="Contraseña" required>
                <div class="error" id="passwordError">La contraseña debe tener al menos 8 caracteres.</div>

                <button type="submit">Iniciar sesión</button>
            </form>
        </div>
    </div>

    <script>
        const loginForm = document.getElementById('loginForm');
        const emailInput = document.getElementById('email');
        const passwordInput = document.getElementById('password');
        const emailError = document.getElementById('emailError');
        const passwordError = document.getElementById('passwordError');

        loginForm.addEventListener('submit', (e) => {
            e.preventDefault(); // Evitar recarga del formulario

            // Validaciones
            let valid = true;

            if (!emailInput.value.includes('@')) {
                emailError.style.display = 'block';
                valid = false;
            } else {
                emailError.style.display = 'none';
            }

            if (passwordInput.value.length < 8) {
                passwordError.style.display = 'block';
                valid = false;
            } else {
                passwordError.style.display = 'none';
            }

            // Verificar credenciales
            if (valid) {
                const email = emailInput.value;
                const password = passwordInput.value;

                if (email === 'alfonso@ut.com' && password === '12345678') {
                    window.location.href = 'Damn.html'; // Redirigir a Damn.html
                } else {
                    alert('Usuario o contraseña incorrectos.');
                }
            }
        });

        // Galería rotativa
        const images = document.querySelectorAll('.gallery-container img');
        let currentIndex = 0;

        function rotateImages() {
            images[currentIndex].classList.remove('active');
            currentIndex = (currentIndex + 1) % images.length;
            images[currentIndex].classList.add('active');
        }

        setInterval(rotateImages, 3000); // Cambiar imagen cada 3 segundos
    </script>

</body>

</html>
